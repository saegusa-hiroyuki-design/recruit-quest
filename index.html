<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>転職クエスト</title>
    <style>
        html, body, canvas {
            margin: 0px;
            padding: 0px;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }
    </style>
</head>
<body>
    <canvas id="glcanvas"></canvas>
    <!-- 先にJSを読み込みます -->
    <script src="https://macroquad.rs/js/mq_js_bundle.js"></script>
    <script>
        // JSの読み込み完了を待ってから実行する仕組みです
        async function start() {
            // もし load がまだ定義されていなければ、少し待ちます
            while (typeof load !== 'function') {
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            load("recruit-quest.wasm");
        }
        start();
    </script>
</body>
</html>
